<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Production splash screen: shows instantly (no JS needed) while the app
         bundle downloads, then fades out once React has mounted. -->
    <style>
      #app-splash{
        position:fixed;inset:0;z-index:9999;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:radial-gradient(ellipse at 50% 30%, #101a2e 0%, #070b13 60%, #05070c 100%);
        font-family:'Inter','DM Sans',system-ui,sans-serif;
        transition:opacity .45s ease, visibility .45s ease;
      }
      #app-splash.splash-hide{opacity:0;visibility:hidden;}
      .splash-logo{
        width:74px;height:74px;border-radius:20px;
        background:linear-gradient(135deg,#3b82f6,#06b6d4);
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 12px 40px rgba(59,130,246,.45);
        margin-bottom:26px;position:relative;
        animation:splash-float 2.4s ease-in-out infinite;
      }
      .splash-logo svg{width:40px;height:40px;stroke:#fff;}
      @keyframes splash-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      .splash-title{
        color:#eaf0fb;font-size:24px;font-weight:800;letter-spacing:-.02em;
        margin-bottom:8px;
      }
      .splash-sub{color:#7c8aa3;font-size:13px;font-weight:500;margin-bottom:30px;}
      .splash-bar{
        width:190px;height:4px;border-radius:99px;background:rgba(255,255,255,.08);
        overflow:hidden;position:relative;
      }
      .splash-bar::before{
        content:"";position:absolute;left:0;top:0;height:100%;width:40%;border-radius:99px;
        background:linear-gradient(90deg,#3b82f6,#06b6d4);
        animation:splash-slide 1.15s ease-in-out infinite;
      }
      @keyframes splash-slide{
        0%{left:-40%}100%{left:100%}
      }
    </style>
    <div id="app-splash">
      <div class="splash-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/>
        </svg>
      </div>
      <div class="splash-title">Strategy Lab</div>
      <div class="splash-sub">Loading market engine…</div>
      <div class="splash-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
