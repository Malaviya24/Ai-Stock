<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Newsprint design system fonts: Playfair (headlines), Lora (body),
         Inter (UI/labels), JetBrains Mono (data/metadata). -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Production splash screen: shows instantly (no JS needed) while the app
         bundle downloads, then fades out once React has mounted. -->
    <style>
      #app-splash{
        position:fixed;inset:0;z-index:9999;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:#F9F9F7;
        background-image:radial-gradient(#111111 1px, transparent 1px);
        background-size:18px 18px;
        font-family:'Inter','Helvetica Neue',sans-serif;
        transition:opacity .45s ease, visibility .45s ease;
      }
      #app-splash.splash-hide{opacity:0;visibility:hidden;}
      .splash-logo{
        width:76px;height:76px;border-radius:0;
        background:#111111;
        display:flex;align-items:center;justify-content:center;
        margin-bottom:22px;position:relative;
      }
      .splash-logo svg{width:42px;height:42px;stroke:#F9F9F7;}
      .splash-kicker{
        font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.32em;
        text-transform:uppercase;color:#737373;margin-bottom:10px;
      }
      .splash-title{
        font-family:'Playfair Display',serif;color:#111111;font-size:40px;font-weight:900;
        letter-spacing:-.02em;line-height:1;margin-bottom:6px;
      }
      .splash-sub{
        font-family:'JetBrains Mono',monospace;color:#737373;font-size:11px;
        letter-spacing:.18em;text-transform:uppercase;margin-bottom:28px;
      }
      .splash-bar{
        width:210px;height:3px;border-radius:0;background:#E5E5E0;
        overflow:hidden;position:relative;
      }
      .splash-bar::before{
        content:"";position:absolute;left:0;top:0;height:100%;width:40%;border-radius:0;
        background:#111111;
        animation:splash-slide 1.1s ease-in-out infinite;
      }
      @keyframes splash-slide{
        0%{left:-40%}100%{left:100%}
      }
    </style>
    <div id="app-splash">
      <div class="splash-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
          <path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/>
        </svg>
      </div>
      <div class="splash-kicker">Est. MMXXVI</div>
      <div class="splash-title">Strategy Lab</div>
      <div class="splash-sub">The Market Ledger</div>
      <div class="splash-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
